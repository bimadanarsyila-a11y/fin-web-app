<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Keuangan Pribadi</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // Mengaktifkan mode gelap berbasis class HTML
    }
  </script>

  <!-- Babel untuk kompilasi JSX di Browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
  
  <!-- Root untuk aplikasi React -->
  <div id="root"></div>

  <!-- Script Utama Aplikasi dengan dukungan ES Module -->
  <script type="text/babel" data-type="module">
    // --- IMPORT DARI CDN MENGGUNAKAN ES MODULES ---
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      PlusCircle, Download, Wallet, TrendingUp, TrendingDown, PiggyBank, 
      Trash2, Calendar, DollarSign, Sun, Moon, ArrowLeft, Target, Edit2, 
      ChevronDown, AlertCircle, Clock, CheckCircle2, CreditCard, Filter, ClipboardList, LogOut
    } from 'https://esm.sh/lucide-react@0.292.0';
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.38.4';

    // ==========================================
    // MASUKKAN KREDENSIAL SUPABASE ANDA DI SINI
    // ==========================================
    const SUPABASE_URL = 'https://ncwtnqmwzrnpgsvjhnwv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jd3RucW13enJucGdzdmpobnd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NjM4MzgsImV4cCI6MjA5MzAzOTgzOH0.tDBX2HOVcbkY4rw8yTIXAy5t_KvSjdFfU-HiDnW4mQg';
    
    // Inisialisasi Supabase
    let supabase = null;
    let isSupabaseConfigured = false;
    
    try {
      if (SUPABASE_URL.startsWith('http://') || SUPABASE_URL.startsWith('https://')) {
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        isSupabaseConfigured = true;
      }
    } catch (error) {
      console.warn("Konfigurasi Supabase belum valid.");
    }

    // --- KONSTANTA GLOBAL ---
    const box3D = "border-2 border-gray-900 dark:border-gray-600 shadow-[4px_4px_0_0_#111827] dark:shadow-[4px_4px_0_0_#000000] transition-all";
    const box3DHover = "hover:shadow-[6px_6px_0_0_#111827] dark:hover:shadow-[6px_6px_0_0_#000000] hover:-translate-y-0.5 transition-all";

    // --- KOMPONEN UTAMA ---
    function App() {
      const [session, setSession] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      // Cek sesi login
      useEffect(() => {
        if (!isSupabaseConfigured) {
          setIsLoading(false);
          return;
        }

        supabase.auth.getSession().then(({ data: { session }, error }) => {
          if (!error) {
            setSession(session);
          }
          setIsLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => subscription.unsubscribe();
      }, []);

      if (isLoading) return <div className="min-h-screen flex items-center justify-center text-gray-500 font-bold">Memuat Aplikasi...</div>;

      // Peringatan jika Supabase belum dikonfigurasi
      if (!isSupabaseConfigured) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className={`bg-white dark:bg-gray-800 p-8 rounded-2xl max-w-md w-full text-center ${box3D}`}>
              <AlertCircle size={48} className="text-red-500 mx-auto mb-4" />
              <h1 className="text-2xl font-black text-gray-900 dark:text-white mb-2 tracking-tight">Koneksi Database</h1>
              <p className="text-gray-500 dark:text-gray-400 font-medium mb-6">Aplikasi ini membutuhkan koneksi Supabase untuk menyimpan data.</p>
              <div className="text-sm text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 p-4 rounded-xl text-left border border-gray-200 dark:border-gray-600">
                Silakan ganti variabel <br/>
                <code className="text-indigo-600 dark:text-indigo-400 font-black">SUPABASE_URL</code> dan <code className="text-indigo-600 dark:text-indigo-400 font-black">SUPABASE_ANON_KEY</code> <br/>
                di dalam kode <code className="bg-gray-200 dark:bg-gray-600 px-1 rounded">index.html</code> dengan kunci API dari dasbor Supabase Anda.
              </div>
            </div>
          </div>
        );
      }

      // Jika belum login, tampilkan layar login
      if (!session) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className={`bg-white dark:bg-gray-800 p-8 rounded-2xl max-w-md w-full text-center ${box3D}`}>
              <div className="bg-indigo-100 text-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <Wallet size={32} />
              </div>
              <h1 className="text-2xl font-black text-gray-900 dark:text-white mb-2 tracking-tight">KeuanganKu</h1>
              <p className="text-gray-500 dark:text-gray-400 font-medium mb-8">Pantau keuangan dengan mudah, sinkron di semua perangkat Anda.</p>
              <button 
                onClick={() => supabase.auth.signInWithOAuth({ provider: 'google' })}
                className="w-full flex items-center justify-center gap-3 bg-white dark:bg-gray-700 text-gray-800 dark:text-white border-2 border-gray-300 dark:border-gray-600 py-3.5 px-4 rounded-xl font-bold hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors shadow-[2px_2px_0_0_#111827] dark:shadow-[2px_2px_0_0_#ffffff] active:translate-y-[2px] active:shadow-none"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Lanjutkan dengan Google
              </button>
            </div>
          </div>
        );
      }

      // Jika sudah login, tampilkan Dashboard Utama
      return <Dashboard user={session.user} onLogout={() => supabase.auth.signOut()} />;
    }

    function Dashboard({ user, onLogout }) {
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('finance_theme') === 'dark');
      const [currentView, setCurrentView] = useState('dashboard');
      const [isFetchingData, setIsFetchingData] = useState(true);

      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [plans, setPlans] = useState([]);
      const [wallets, setWallets] = useState([]);
      const [customCategories, setCustomCategories] = useState([]);

      const initialCategoryMap = {
        'Pemasukan': ['Gaji', 'Bonus', 'Hasil Bisnis', 'Investasi'],
        'Pengeluaran Harian': ['Makan & Minum', 'Transportasi', 'Belanja', 'Hiburan'],
        'Biaya Bulanan': ['Listrik & Air', 'Internet', 'Sewa/KPR', 'Cicilan', 'Asuransi'],
        'Tabungan': ['Dana Darurat', 'Investasi', 'Tabungan Liburan']
      };

      // FETCH DATA DARI SUPABASE
      useEffect(() => {
        const loadData = async () => {
          setIsFetchingData(true);
          try {
            const [txRes, walletRes, goalsRes, plansRes, catRes] = await Promise.all([
              supabase.from('transactions').select('*').order('date', { ascending: false }),
              supabase.from('wallets').select('*'),
              supabase.from('goals').select('*'),
              supabase.from('plans').select('*').order('month', { ascending: false }),
              supabase.from('categories').select('*')
            ]);

            if (txRes.data) setTransactions(txRes.data);
            if (walletRes.data) setWallets(walletRes.data);
            if (goalsRes.data) setGoals(goalsRes.data);
            if (plansRes.data) setPlans(plansRes.data);
            if (catRes.data) setCustomCategories(catRes.data);

          } catch (error) {
            console.error("Error fetching data:", error);
          } finally {
            setIsFetchingData(false);
          }
        };
        loadData();
      }, []);

      // Gabungkan kategori default dengan kategori kustom dari database
      const categoryMap = useMemo(() => {
        const map = { ...initialCategoryMap };
        customCategories.forEach(c => {
          if (!map[c.type]) map[c.type] = [];
          if (!map[c.type].includes(c.name)) map[c.type].push(c.name);
        });
        return map;
      }, [customCategories]);

      const [globalFilterType, setGlobalFilterType] = useState('month'); 
      const [globalFilterValue, setGlobalFilterValue] = useState(new Date().toISOString().slice(0, 7));
      const [tableFilters, setTableFilters] = useState({ date: '', category: '', desc: '', type: '' });

      const [historyType, setHistoryType] = useState('pemasukan');
      const [historyCatFilter, setHistoryCatFilter] = useState('');
      const [historyTimeFilterType, setHistoryTimeFilterType] = useState('all');
      const [historyTimeFilterValue, setHistoryTimeFilterValue] = useState(new Date().toISOString().slice(0, 7));

      const [isSelectMode, setIsSelectMode] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());

      const [formData, setFormData] = useState({
        date: new Date().toISOString().split('T')[0], type: 'Pemasukan', customType: '', category: 'Gaji', customCategory: '', amount: '', description: ''
      });

      const [catDropdownOpen, setCatDropdownOpen] = useState(false);
      const [planCatDropdownOpen, setPlanCatDropdownOpen] = useState(false);
      
      const [showGoalForm, setShowGoalForm] = useState(false);
      const [goalForm, setGoalForm] = useState({ name: '', target: '', date: '', urgency: 'sedang' });
      
      const [planForm, setPlanForm] = useState({
        month: new Date().toISOString().slice(0, 7), type: 'Pengeluaran Harian', customType: '', category: 'Makan & Minum', customCategory: '', amount: '', description: ''
      });

      const [showWalletForm, setShowWalletForm] = useState(false);
      const [walletForm, setWalletForm] = useState({ name: '', color: 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300' });

      const [modalState, setModalState] = useState({
        isOpen: false, type: 'confirm', title: '', message: '', inputValue: '', inputType: 'text', isCurrency: false, onConfirm: null,
      });

      const closeModal = () => setModalState(prev => ({ ...prev, isOpen: false, inputValue: '' }));

      useEffect(() => {
        localStorage.setItem('finance_theme', darkMode ? 'dark' : 'light');
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number || 0);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (name === 'type') {
          const isCustom = value === 'Lainnya...';
          const firstCat = isCustom ? '' : (categoryMap[value] ? categoryMap[value][0] : '');
          setFormData(prev => ({ ...prev, type: value, category: isCustom ? 'Lainnya...' : firstCat, customType: isCustom ? prev.customType : '', customCategory: isCustom ? prev.customCategory : '' }));
        } else if (name === 'amount') {
          const num = value.replace(/[^0-9]/g, '');
          setFormData(prev => ({ ...prev, amount: num ? new Intl.NumberFormat('id-ID').format(num) : '' }));
        } else {
          setFormData(prev => ({ ...prev, [name]: value }));
        }
      };

      const handleCatSelect = (cat) => { setFormData(prev => ({ ...prev, category: cat, customCategory: cat === 'Lainnya...' ? prev.customCategory : '' })); setCatDropdownOpen(false); };
      const handlePlanCatSelect = (cat) => { setPlanForm(prev => ({ ...prev, category: cat, customCategory: cat === 'Lainnya...' ? prev.customCategory : '' })); setPlanCatDropdownOpen(false); };

      const deleteCategoryFromMap = async (e, type, categoryToDelete) => {
        e.preventDefault(); e.stopPropagation(); setCatDropdownOpen(false); setPlanCatDropdownOpen(false);
        setModalState({
          isOpen: true, type: 'confirm', title: 'Hapus Kategori', message: `Hapus kategori kustom "${categoryToDelete}"? (Kategori default tidak bisa dihapus)`,
          onConfirm: async () => {
            const targetCat = customCategories.find(c => c.type === type && c.name === categoryToDelete);
            if (targetCat) {
              const { error } = await supabase.from('categories').delete().eq('id', targetCat.id);
              if (error) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Dihapus', message: error.message }), 300);
              setCustomCategories(prev => prev.filter(c => c.id !== targetCat.id));
            }
            if(formData.category === categoryToDelete) setFormData(prev => ({ ...prev, category: 'Lainnya...' }));
          }
        });
      };

      const filteredByGlobal = useMemo(() => {
        return transactions.filter(t => {
          if (globalFilterType === 'all') return true;
          if (globalFilterType === 'month') return t.date.startsWith(globalFilterValue);
          if (globalFilterType === 'date') return t.date === globalFilterValue;
          return true;
        });
      }, [transactions, globalFilterType, globalFilterValue]);

      const filteredForTable = useMemo(() => {
        return filteredByGlobal.filter(t => {
          return t.date.includes(tableFilters.date) &&
                 (tableFilters.category === '' || t.category === tableFilters.category) &&
                 t.description.toLowerCase().includes(tableFilters.desc.toLowerCase()) &&
                 (tableFilters.type === '' || t.type === tableFilters.type);
        });
      }, [filteredByGlobal, tableFilters]);

      const uniqueTypes = useMemo(() => [...new Set(filteredByGlobal.map(t => t.type))], [filteredByGlobal]);
      const uniqueCats = useMemo(() => [...new Set(filteredByGlobal.map(t => t.category))], [filteredByGlobal]);

      const stats = useMemo(() => {
        let totalAllPemasukan = 0; let totalAllPengeluaran = 0; let totalAllTabungan = 0;
        transactions.forEach(t => {
          if (t.type.toLowerCase().includes('pemasukan')) totalAllPemasukan += t.amount;
          else if (t.type.toLowerCase().includes('tabungan')) totalAllTabungan += t.amount;
          else totalAllPengeluaran += t.amount;
        });

        let filteredPemasukan = 0; let filteredPengeluaran = 0;
        filteredByGlobal.forEach(t => {
          if (t.type.toLowerCase().includes('pemasukan')) filteredPemasukan += t.amount;
          else if (!t.type.toLowerCase().includes('tabungan')) filteredPengeluaran += t.amount;
        });

        return {
          saldoSaatIni: totalAllPemasukan - totalAllPengeluaran - totalAllTabungan, totalTabungan: totalAllTabungan,
          pemasukanFilter: filteredPemasukan, pengeluaranFilter: filteredPengeluaran
        };
      }, [transactions, filteredByGlobal]);

      const sumOfWallets = wallets.reduce((acc, w) => acc + w.balance, 0);

      // --- SUPABASE CRUD TRANSACTIONS ---
      const handleSubmitTransaction = async (e) => {
        e.preventDefault();
        const parsedAmount = parseInt(formData.amount.replace(/[^0-9]/g, ''), 10);
        if (isNaN(parsedAmount) || parsedAmount <= 0) return;

        let finalType = formData.type; let finalCategory = formData.category;

        if (formData.type === 'Lainnya...' && formData.customType.trim() !== '') {
          finalType = formData.customType.trim();
        }
        if (formData.category === 'Lainnya...' && formData.customCategory.trim() !== '') {
          finalCategory = formData.customCategory.trim();
          // Simpan ke DB Categories jika baru
          if (!categoryMap[finalType]?.includes(finalCategory)) {
            const { data, error } = await supabase.from('categories').insert([{ user_id: user.id, type: finalType, name: finalCategory }]).select();
            if (error) return setModalState({ isOpen: true, type: 'alert', title: 'Gagal Simpan Kategori', message: error.message });
            if (data) setCustomCategories([...customCategories, ...data]);
          }
        }

        const newTx = {
          user_id: user.id, date: formData.date, type: finalType, category: finalCategory,
          amount: parsedAmount, description: formData.description || '-'
        };

        const { data, error } = await supabase.from('transactions').insert([newTx]).select();
        if (error) {
          setModalState({ isOpen: true, type: 'alert', title: 'Gagal Menyimpan', message: error.message });
          return;
        }

        if (data) setTransactions([data[0], ...transactions]);
        setFormData(prev => ({ ...prev, type: finalType, category: finalCategory, customType: '', customCategory: '', amount: '', description: '' }));
      };

      const deleteTransactionItem = (id) => {
        setModalState({
          isOpen: true, type: 'confirm', title: 'Hapus Transaksi', message: 'Hapus transaksi ini permanen?',
          onConfirm: async () => {
            const { error } = await supabase.from('transactions').delete().eq('id', id);
            if (error) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Dihapus', message: error.message }), 300);
            setTransactions(prev => prev.filter(t => t.id !== id));
          }
        });
      };

      const deleteSelectedTransactions = () => {
        setModalState({
          isOpen: true, type: 'confirm', title: 'Hapus Multi Transaksi', message: `Hapus ${selectedIds.size} transaksi terpilih secara permanen?`,
          onConfirm: async () => {
            const idsArray = Array.from(selectedIds);
            const { error } = await supabase.from('transactions').delete().in('id', idsArray);
            if (error) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Dihapus', message: error.message }), 300);
            
            setTransactions(prev => prev.filter(t => !selectedIds.has(t.id)));
            setSelectedIds(new Set()); setIsSelectMode(false);
          }
        });
      };

      // --- SUPABASE CRUD SAVINGS ---
      const renderSavingsView = () => {
        const handleGoalSubmit = async (e) => {
          e.preventDefault();
          const target = parseInt(goalForm.target.replace(/[^0-9]/g, ''), 10);
          if (!goalForm.name || isNaN(target) || target <= 0) return;
          
          const newGoal = { user_id: user.id, name: goalForm.name, target, saved: 0, date: goalForm.date || null, urgency: goalForm.urgency };
          const { data, error } = await supabase.from('goals').insert([newGoal]).select();
          
          if (error) return setModalState({ isOpen: true, type: 'alert', title: 'Gagal Menyimpan', message: error.message });
          
          if (data) setGoals([...goals, data[0]]);
          setShowGoalForm(false); setGoalForm({ name: '', target: '', date: '', urgency: 'sedang' });
        };

        const updateGoalSaved = (id, currentSaved) => {
          setModalState({
            isOpen: true, type: 'prompt', inputType: 'text', isCurrency: true, title: 'Update Saldo Target',
            message: "Masukkan nominal yang ditambahkan (ketik '-' di awal untuk mengurangi):", inputValue: '',
            onConfirm: async (val) => {
              const isNegative = val.startsWith('-');
              let amount = parseInt(val.replace(/[^0-9]/g, ''), 10);
              if (isNaN(amount)) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Error', message: 'Nominal tidak valid!' }), 300);
              if (isNegative) amount = -amount;
              
              const newSaved = Math.max(0, currentSaved + amount);
              const { error } = await supabase.from('goals').update({ saved: newSaved }).eq('id', id);
              if (error) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Update', message: error.message }), 300);

              setGoals(goals.map(g => g.id === id ? { ...g, saved: newSaved } : g));
            }
          });
        };

        const deleteGoal = (id) => {
          setModalState({
            isOpen: true, type: 'confirm', title: 'Hapus Target', message: 'Hapus target tabungan ini?', 
            onConfirm: async () => {
              const { error } = await supabase.from('goals').delete().eq('id', id);
              if (error) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Dihapus', message: error.message }), 300);
              setGoals(goals.filter(g => g.id !== id));
            }
          });
        }

        return (
          <div className="space-y-4 sm:space-y-6 animate-fadeIn">
            <div className="flex items-center gap-3 sm:gap-4">
              <button onClick={() => setCurrentView('dashboard')} className={`p-2 bg-gray-200 dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-700 rounded-full ${box3D}`}><ArrowLeft size={18} className="sm:w-5 sm:h-5" /></button>
              <h2 className="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2"><Target className="text-purple-500 w-5 h-5 sm:w-6 sm:h-6" /> Target Tabungan</h2>
            </div>
            <div className={`bg-purple-100 dark:bg-purple-900/30 p-4 sm:p-6 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${box3D}`}>
              <div className="w-full md:w-auto">
                <p className="text-purple-800 dark:text-purple-300 font-bold text-sm sm:text-base">Total Seluruh Tabungan</p>
                <h3 className="text-2xl sm:text-3xl font-black text-purple-900 dark:text-purple-100 mt-1 tracking-tight truncate">{formatRupiah(stats.totalTabungan)}</h3>
              </div>
              <button onClick={() => setShowGoalForm(!showGoalForm)} className={`w-full md:w-auto bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 sm:py-2.5 rounded-lg font-bold ${box3DHover}`}>{showGoalForm ? "Batal" : "+ Buat Target Baru"}</button>
            </div>

            {showGoalForm && (
              <form onSubmit={handleGoalSubmit} className={`bg-white dark:bg-gray-800 p-4 sm:p-6 rounded-2xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 ${box3D}`}>
                <div><label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nama Target</label><input type="text" required value={goalForm.name} onChange={e => setGoalForm({...goalForm, name: e.target.value})} placeholder="Misal: Beli Laptop" className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-800 dark:text-white outline-none focus:border-gray-900 dark:focus:border-white transition-colors" /></div>

              const actualAmount = parseInt(val.replace(/[^0-9]/g, ''), 10);
              if (isNaN(actualAmount) || actualAmount <= 0) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Error', message: 'Nominal tidak valid!' }), 300);
              
              const { error: updateError } = await supabase.from('plans').update({ is_completed: true }).eq('id', plan.id);
              if (updateError) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Update', message: updateError.message }), 300);

              setPlans(prev => prev.map(p => p.id === plan.id ? { ...p, is_completed: true } : p));
              
              const newTx = { user_id: user.id, date: new Date().toISOString().split('T')[0], type: plan.type, category: plan.category, amount: actualAmount, description: `[Rencana] ${plan.description}` };
              const { data, error: txError } = await supabase.from('transactions').insert([newTx]).select();
              
              if (txError) return setTimeout(() => setModalState({ isOpen: true, type: 'alert', title: 'Gagal Simpan Transaksi', message: txError.message }), 300);
              if (data) setTransactions(prev => [data[0], ...prev]);
            }
          });
        };

          setModalState({
            isOpen: true, type: 'confirm', title: 'Hapus Rencana', message: 'Hapus rencana ini dari daftar?',

                    <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Kategori</label>

                            <div>
                              <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-1.5">Jenis Transaksi</label>
                              <select name="type" value={formData.type} onChange={handleInputChange} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2 sm:p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium outline-none focus:border-gray-900 dark:focus:border-white transition-colors cursor-pointer text-sm sm:text-base">{Object.keys(categoryMap).map(type => <option key={type} value={type}>{type}</option>)}<option value="Lainnya...">Lainnya...</option></select>
                              {formData.type === 'Lainnya...' && <input type="text" name="customType" placeholder="Ketik jenis transaksi baru..." required value={formData.customType} onChange={handleInputChange} className="mt-2 w-full border-2 border-indigo-300 dark:border-indigo-600 rounded-lg p-2 sm:p-2.5 bg-indigo-50 dark:bg-indigo-900/20 text-gray-900 dark:text-white font-medium outline-none text-sm sm:text-base" />}
                            </div>

                            <div className="relative">
                              <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-1.5">Kategori</label>
                              <div onClick={() => setCatDropdownOpen(!catDropdownOpen)} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2 sm:p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium flex justify-between items-center cursor-pointer select-none transition-colors focus:border-gray-900 dark:focus:border-gray-400 text-sm sm:text-base"><span className="truncate pr-2">{formData.category}</span><ChevronDown size={16} className="text-gray-500 shrink-0 sm:w-[18px] sm:h-[18px]" /></div>
                              {catDropdownOpen && (
                                <><div className="fixed inset-0 z-40" onClick={() => setCatDropdownOpen(false)}></div>
                                  <div className="absolute z-50 w-full mt-1 sm:mt-2 bg-white dark:bg-gray-800 border-2 border-gray-800 dark:border-gray-600 rounded-lg shadow-[4px_4px_0_0_#000000] max-h-48 overflow-y-auto">
                                    {(categoryMap[formData.type] || []).map(cat => (
                                      <div key={cat} className="flex justify-between items-center p-2.5 sm:p-3 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer font-medium border-b border-gray-100 dark:border-gray-700 text-sm sm:text-base"><span onClick={() => handleCatSelect(cat)} className="flex-1 text-gray-900 dark:text-white truncate">{cat}</span><div className="p-1 sm:p-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-red-100 dark:hover:bg-red-900/50 rounded-lg ml-2 group transition-colors shrink-0" onMouseDown={(e) => deleteCategoryFromMap(e, formData.type, cat)}><Trash2 size={14} className="text-gray-400 group-hover:text-red-500 sm:w-4 sm:h-4" /></div></div>
                                    ))}
                                    <div className="p-2.5 sm:p-3 bg-gray-50 dark:bg-gray-900 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer text-gray-900 dark:text-white font-bold text-sm sm:text-base" onClick={() => handleCatSelect('Lainnya...')}>+ Tambah Lainnya...</div>
                                  </div></>
                              )}
                              {formData.category === 'Lainnya...' && <input type="text" name="customCategory" placeholder="Ketik kategori baru..." required value={formData.customCategory} onChange={handleInputChange} className="mt-2 w-full border-2 border-indigo-300 dark:border-indigo-600 rounded-lg p-2 sm:p-2.5 bg-indigo-50 dark:bg-indigo-900/20 text-gray-900 dark:text-white font-medium outline-none text-sm sm:text-base" />}
                            </div>

                            <div>
                              <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-1.5">Nominal (Rp)</label>
                              <div className="relative"><div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><DollarSign size={16} className="text-gray-500 sm:w-[18px] sm:h-[18px]" /></div><input type="text" inputMode="numeric" name="amount" placeholder="0" required value={formData.amount} onChange={handleInputChange} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg pl-9 sm:pl-10 p-2 sm:p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-black outline-none focus:border-gray-900 dark:focus:border-white transition-colors tracking-tight text-base sm:text-lg" /></div>
                            </div>

                            <div>
                              <label className="block text-xs sm:text-sm font-bold text-gray-700 dark:text-gray-300 mb-1 sm:mb-1.5">Keterangan</label>
                              <input type="text" name="description" placeholder="Cth: Makan siang..." value={formData.description} onChange={handleInputChange} className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2 sm:p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-medium outline-none focus:border-gray-900 dark:focus:border-white transition-colors text-sm sm:text-base" />
                            </div>

                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-3 sm:py-3.5 px-4 rounded-xl transition-all mt-4 sm:mt-6 border-2 border-indigo-900 shadow-[2px_2px_0_0_#312e81] active:shadow-none active:translate-y-[2px] text-sm sm:text-base">Simpan Transaksi</button>
                          </form>
                        </div>
                      </div>

                      <div className={`lg:col-span-8 bg-white dark:bg-gray-800 rounded-2xl flex flex-col h-[500px] lg:h-full overflow-hidden ${box3D}`}>
                        <div className="p-4 sm:p-6 border-b-2 border-gray-200 dark:border-gray-700 shrink-0 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white dark:bg-gray-800 gap-3 sm:gap-0">
                          <h2 className="text-lg sm:text-xl font-black text-gray-900 dark:text-white">Riwayat Transaksi</h2>
                          <div className="flex gap-2 w-full sm:w-auto">
                            {isSelectMode ? (
                               <button onClick={deleteSelectedTransactions} disabled={selectedIds.size === 0} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-red-600 hover:bg-red-700 text-white px-3 sm:px-3.5 py-2 rounded-lg text-xs sm:text-sm font-bold border-2 border-red-900 disabled:opacity-50 disabled:cursor-not-allowed shadow-[2px_2px_0_0_#7f1d1d] active:shadow-none active:translate-y-[2px] transition-all"><Trash2 size={14} className="sm:w-4 sm:h-4" /> Hapus ({selectedIds.size})</button>
                            ) : (
                              <button onClick={() => {
                                 const headers = ['ID,Tanggal,Tipe,Kategori,Nominal,Keterangan'];
                                 const csvData = transactions.map(t => `${t.id},${t.date},${t.type},${t.category},${t.amount},"${t.description.replace(/"/g, '""')}"`);
                                 const blob = new Blob([headers.concat(csvData).join('\n')], { type: 'text/csv;charset=utf-8;' });
                                 const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.setAttribute('download', `Keuangan_${new Date().toISOString().split('T')[0]}.csv`);
                                 document.body.appendChild(link); link.click(); document.body.removeChild(link);
                              }} className="flex-1 sm:flex-none flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white px-3 sm:px-3.5 py-2 rounded-lg text-xs sm:text-sm font-bold border-2 border-green-900 shadow-[2px_2px_0_0_#14532d] active:shadow-none active:translate-y-[2px] transition-all"><Download size={14} className="sm:w-4 sm:h-4" /> Export CSV</button>
                            )}
                          </div>
                        </div>
                        
                        <div className="flex-1 overflow-x-auto overflow-y-auto bg-gray-50 dark:bg-gray-900/50 relative">
                          <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead className="bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 text-xs sm:text-sm sticky top-0 z-10 shadow-sm border-b-2 border-gray-200 dark:border-gray-700">
                              <tr>
                                {isSelectMode && <th className="p-2 sm:p-3 w-10 sm:w-12 text-center border-r border-gray-100 dark:border-gray-700">✓</th>}
                                <th className="p-2 sm:p-3 font-bold whitespace-nowrap">Tanggal</th>
                                <th className="p-2 sm:p-3 font-bold">Tipe</th>
                                <th className="p-2 sm:p-3 font-bold">Kategori</th>
                                <th className="p-2 sm:p-3 font-bold">Keterangan</th>
                                <th className="p-2 sm:p-3 font-bold text-right">Nominal</th>
                                <th className="p-2 sm:p-3 font-bold text-center">Aksi</th>
                              </tr>
                              <tr className="bg-gray-100 dark:bg-gray-700/50 border-b-2 border-gray-200 dark:border-gray-700">
                                {isSelectMode && <th className="p-1 border-r border-gray-200 dark:border-gray-600"></th>}
                                <th className="p-1 px-2"><input type="date" value={tableFilters.date} onChange={e => setTableFilters({...tableFilters, date: e.target.value})} className="w-full min-w-[110px] p-1.5 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-[11px] sm:text-xs font-semibold outline-none focus:border-indigo-500" /></th>
                                <th className="p-1 px-2"><select value={tableFilters.type} onChange={e => setTableFilters({...tableFilters, type: e.target.value})} className="w-full min-w-[100px] p-1.5 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-[11px] sm:text-xs font-semibold outline-none focus:border-indigo-500"><option value="">Semua</option>{uniqueTypes.map(t => <option key={t} value={t}>{t}</option>)}</select></th>
                                <th className="p-1 px-2"><select value={tableFilters.category} onChange={e => setTableFilters({...tableFilters, category: e.target.value})} className="w-full min-w-[100px] p-1.5 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-[11px] sm:text-xs font-semibold outline-none focus:border-indigo-500"><option value="">Semua</option>{uniqueCats.map(c => <option key={c} value={c}>{c}</option>)}</select></th>
                                <th className="p-1 px-2"><input type="text" placeholder="Cari..." value={tableFilters.desc} onChange={e => setTableFilters({...tableFilters, desc: e.target.value})} className="w-full min-w-[100px] p-1.5 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 text-gray-800 dark:text-white text-[11px] sm:text-xs font-semibold outline-none focus:border-indigo-500" /></th>
                                <th className="p-1 px-2"></th>
                                <th className="p-1 px-2 text-center"><button onClick={() => { setIsSelectMode(!isSelectMode); setSelectedIds(new Set()); }} className={`text-[11px] sm:text-xs font-bold px-1.5 py-1.5 rounded w-full transition-colors ${isSelectMode ? 'bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300' : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300 hover:bg-indigo-200'}`}>{isSelectMode ? 'Batal' : 'Pilih Baris'}</button></th>
                              </tr>
                            </thead>
                            <tbody className="text-xs sm:text-sm">
                              {filteredForTable.length === 0 ? (
                                <tr><td colSpan={isSelectMode ? "7" : "6"} className="text-center text-gray-500 py-12 sm:py-16 bg-white dark:bg-gray-800 h-full"><Wallet size={40} className="mx-auto mb-3 opacity-20 sm:w-12 sm:h-12" /><p className="font-bold">Tidak ada transaksi ditemukan.</p></td></tr>
                              ) : (
                                filteredForTable.map((t) => {
                                  const isIncome = t.type.toLowerCase().includes('pemasukan');
                                  const isSaving = t.type.toLowerCase().includes('tabungan');
                                  return (
                                    <tr key={t.id} className="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                                      {isSelectMode && <td className="p-2 sm:p-3 text-center border-r border-gray-100 dark:border-gray-700"><input type="checkbox" checked={selectedIds.has(t.id)} onChange={() => toggleSelectTransaction(t.id)} className="w-4 h-4 rounded cursor-pointer accent-indigo-600"/></td>}
                                      <td className="p-3 sm:p-4 text-gray-700 dark:text-gray-300 whitespace-nowrap font-medium">{t.date}</td>
                                      <td className="p-3 sm:p-4"><span className={`px-2 py-1 rounded-md text-[10px] sm:text-xs font-bold inline-block border whitespace-nowrap ${isIncome ? 'bg-green-50 border-green-200 text-green-700 dark:bg-green-900/30 dark:border-green-800 dark:text-green-400' : isSaving ? 'bg-purple-50 border-purple-200 text-purple-700 dark:bg-purple-900/30 dark:border-purple-800 dark:text-purple-400' : 'bg-red-50 border-red-200 text-red-700 dark:bg-red-900/30 dark:border-red-800 dark:text-red-400'}`}>{t.type.toUpperCase()}</span></td>
                                      <td className="p-3 sm:p-4 text-gray-900 dark:text-gray-100 font-bold max-w-[120px] truncate sm:max-w-none">{t.category}</td>
                                      <td className="p-3 sm:p-4 text-gray-600 dark:text-gray-400 font-medium max-w-[150px] truncate sm:max-w-none">{t.description}</td>
                                      <td className={`p-3 sm:p-4 text-right font-black whitespace-nowrap tracking-tight text-sm sm:text-base ${isIncome ? 'text-green-600 dark:text-green-400' : isSaving ? 'text-purple-600 dark:text-purple-400' : 'text-red-600 dark:text-red-400'}`}>{isIncome ? '+' : '-'}{formatRupiah(t.amount)}</td>
                                      <td className="p-3 sm:p-4 text-center"><button onClick={() => deleteTransactionItem(t.id)} className="text-gray-400 hover:text-white hover:bg-red-500 p-1.5 sm:p-2 rounded-lg transition-all" title="Hapus Permanen"><Trash2 size={16} className="sm:w-[18px] sm:h-[18px]" /></button></td>
                                    </tr>
                                  );
                                })
                              )}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                  </>
                )}
              </>
            )}

            {/* --- CUSTOM GLOBAL MODAL --- */}
            {modalState.isOpen && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fadeIn">
                <div className={`bg-white dark:bg-gray-800 p-5 sm:p-6 rounded-2xl w-full max-w-[90%] sm:max-w-sm md:max-w-md ${box3D}`}>
                  <h3 className="text-lg sm:text-xl font-black text-gray-900 dark:text-white mb-2">{modalState.title}</h3>
                  <p className="text-sm sm:text-base text-gray-600 dark:text-gray-300 mb-5 sm:mb-6 font-medium leading-relaxed">{modalState.message}</p>
                  
                  {modalState.type === 'prompt' && (
                    <input 
                      type={modalState.inputType} autoFocus value={modalState.inputValue} inputMode={modalState.isCurrency ? "numeric" : "text"}
                      className="w-full border-2 border-gray-300 dark:border-gray-600 rounded-lg p-2.5 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white font-black outline-none focus:border-indigo-500 mb-5 sm:mb-6 transition-colors"
                      onChange={(e) => {
                        let val = e.target.value;
                        if (modalState.isCurrency) {
                          const isNegative = val.startsWith('-');
                          const num = val.replace(/[^0-9]/g, '');
                          val = num ? (isNegative ? '-' : '') + new Intl.NumberFormat('id-ID').format(num) : (isNegative ? '-' : '');
                        }
                        setModalState(prev => ({...prev, inputValue: val}));
                      }}
                      onKeyDown={(e) => { if(e.key === 'Enter') { if(modalState.onConfirm) modalState.onConfirm(modalState.inputValue); closeModal(); } }}
                    />
                  )}

                  <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 sm:gap-3">
                    {modalState.type !== 'alert' && (
                      <button onClick={closeModal} className="w-full sm:w-auto px-4 py-3 sm:py-2.5 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white font-bold rounded-lg transition-colors text-sm sm:text-base">Batal</button>
                    )}
                    <button 
                      onClick={() => { if(modalState.onConfirm) modalState.onConfirm(modalState.inputValue); closeModal(); }} 
                      className={`w-full sm:w-auto px-5 py-3 sm:py-2.5 text-white font-bold rounded-lg transition-all border-2 active:shadow-none active:translate-y-[2px] text-sm sm:text-base ${modalState.type === 'confirm' ? 'bg-red-600 hover:bg-red-700 border-red-900 shadow-[2px_2px_0_0_#7f1d1d]' : 'bg-indigo-600 hover:bg-indigo-700 border-indigo-900 shadow-[2px_2px_0_0_#312e81]'}`}
                    >
                      {modalState.type === 'alert' ? 'OK Mengerti' : (modalState.type === 'confirm' ? 'Ya, Eksekusi' : 'Konfirmasi')}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
